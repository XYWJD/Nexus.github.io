<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑NEXUS TOOL👑</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Microsoft YaHei,sans-serif}
        body{background:#050a15;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:15px}
        .container{background:#0f172a;width:100%;max-width:420px;padding:35px 25px;border-radius:24px;border:1px solid rgba(94,23,235,.3)}
        .title{text-align:center;font-size:30px;font-weight:800;margin-bottom:30px;color:#7c3aed}
        .page{display:none}
        .page.active{display:block}
        .input-box{margin-bottom:20px}
        .input-box label{display:block;margin-bottom:8px;font-size:14px;color:#e2e8f0}
        .input-box input{width:100%;padding:16px;background:#1e293b;border:1px solid #334155;border-radius:14px;color:#fff;outline:none}
        .btn{width:100%;padding:16px;background:linear-gradient(90deg,#7c3aed,#c026d3);border:none;border-radius:14px;color:#fff;font-weight:bold;margin-top:10px}
        .btn-red{background:linear-gradient(90deg,#ef4444,#dc2626)}
        .func{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:25px 0}
        .func button{padding:14px;background:#1e293b;border:1px solid #334155;border-radius:12px;color:#e2e8f0}
        .log-box{margin-top:20px;padding:18px;background:#1e293b;border-radius:14px;min-height:80px}
        .success{color:#10b981}
        .error{color:#ef4444}
        .info{color:#7c3aed}
        .funcContent{display:none}
    </style>
</head>
<body>

<div class="container">
    <div class="title">👑NEXUS TOOL👑</div>
    <div class="page active" id="loginPage">
        <div class="input-box">
            <label>📩 Email</label>
            <input id="login_email" placeholder="Enter your email">
        </div>
        <div class="input-box">
            <label>🔒 Password</label>
            <input type="password" id="login_pwd" placeholder="Enter your password">
        </div>
        <button class="btn" onclick="login()">🔐 Login</button>
    </div>

    <div class="page" id="funcPage">
        <div class="func">
            <button onclick="showFunc('crown')">👑 Crown</button>
        </div>
        <div class="funcContent" id="crown">
            <button class="btn" onclick="shua皇冠()">🚀 Add Crown</button>
        </div>
        <button class="btn btn-red" onclick="logout()" style="margin-top:20px">🚪 Logout</button>
    </div>

    <div class="log-box" id="log"></div>
</div>

<script>
let idToken = "";
let nowEmail = "";
// Backend API endpoint, no sensitive data exposed
const BACKEND_API = "/api/notify";

function show(text, type){
    document.getElementById("log").innerHTML = `<div class="${type}">${text}</div>`;
}
function showPage(id){
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}
function showFunc(id){
    document.querySelectorAll(".funcContent").forEach(p => p.style.display = "none");
    document.getElementById(id).style.display = "block";
}

async function login(){
    const email = document.getElementById("login_email").value.trim();
    const pwd = document.getElementById("login_pwd").value.trim();
    if(!email || !pwd){
        show("❌ Please enter email and password", "error");
        return;
    }
    show("🔄 Logging in...", "info");
    try{
        const res = await fetch("https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=AIzaSyAe_aOVT1gSfmHKBrorFvX4fRwN5nODXVA", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({email: email, password: pwd, returnSecureToken: true})
        });
        const data = await res.json();
        if(!data.idToken){
            show("❌ Login failed", "error");
            return;
        }
        idToken = data.idToken;
        nowEmail = email;
        show("✅ Login successful", "success");
        showPage("funcPage");
        showFunc("crown");
    }catch(e){
        show("❌ Network error", "error");
    }
}

async function shua皇冠(){
    if(!idToken){
        show("❌ Please login first", "error");
        return;
    }
    show("🚀 Processing...", "info");
    try{
        await fetch(BACKEND_API, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({idToken: idToken, email: nowEmail})
        });
        show("🎉 Operation successful", "success");
    }catch(e){
        show("❌ Operation failed", "error");
    }
}

function logout(){
    idToken = "";
    nowEmail = "";
    showPage("loginPage");
    show("🚪 Logged out", "info");
}
</script>
</body>
</html>
