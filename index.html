<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑NEXUS TOOL👑</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: "Segoe UI", sans-serif;
        }
        body{
            background: #050a15;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:15px;
        }
        .container{
            background: #0f172a;
            width:100%;
            max-width:420px;
            padding:35px 25px;
            border-radius:24px;
            border: 1px solid rgba(94, 23, 235, 0.3);
        }
        .title{
            text-align:center;
            font-size:30px;
            font-weight:800;
            margin-bottom:30px;
            color:#7c3aed;
        }
        .page{
            display:none;
        }
        .page.active{
            display:block;
        }
        .input-box{
            margin-bottom:20px;
        }
        .input-box label{
            display:block;
            margin-bottom:8px;
            font-size:14px;
            color:#e2e8f0;
        }
        .input-box input{
            width:100%;
            padding:16px;
            background:#1e293b;
            border:1px solid #334155;
            border-radius:14px;
            color:#fff;
            outline:none;
        }
        .btn{
            width:100%;
            padding:16px;
            background:linear-gradient(90deg,#7c3aed,#c026d3);
            border:none;
            border-radius:14px;
            color:#fff;
            font-weight:bold;
            margin-top:10px;
        }
        .btn-gray{
            background:#1e293b;
        }
        .btn-red{
            background:linear-gradient(90deg,#ef4444,#dc2626);
        }
        .func{
            display:grid;
            grid-template-columns:1fr 1fr 1fr;
            gap:10px;
            margin-bottom:25px;
        }
        .func button{
            padding:14px;
            background:#1e293b;
            border:1px solid #334155;
            border-radius:12px;
            color:#e2e8f0;
        }
        .funcContent{
            display:none;
        }
        .log-box{
            margin-top:20px;
            padding:18px;
            background:#1e293b;
            border-radius:14px;
            min-height:80px;
            font-size:14px;
        }
        .success{color:#10b981;}
        .error{color:#ef4444;}
        .info{color:#7c3aed;}
    </style>
</head>
<body>

<div class="container">
    <div class="title">👑NEXUS TOOL👑</div>

    <div class="page active" id="loginPage">
        <div class="input-box">
            <label>Email</label>
            <input id="login_email" placeholder="Email">
        </div>
        <div class="input-box">
            <label>Password</label>
            <input type="password" id="login_pwd" placeholder="Password">
        </div>
        <button class="btn" onclick="login()">Login</button>
        <button class="btn btn-gray" onclick="showPage('forgetPage')">Forgot Password</button>
    </div>

    <div class="page" id="funcPage">
        <div class="func">
            <button onclick="showFunc('crown')">Crown</button>
            <button onclick="showFunc('email')">Email</button>
            <button onclick="showFunc('pwd')">Password</button>
        </div>

        <div id="crown" class="funcContent">
            <button class="btn" onclick="crown()">Add Crown</button>
        </div>

        <div id="email" class="funcContent">
            <div class="input-box"><label>New Email</label><input id="new_email"></div>
            <button class="btn" onclick="changeEmail()">Update Email</button>
        </div>

        <div id="pwd" class="funcContent">
            <div class="input-box"><label>New Password</label><input type="password" id="new_pwd"></div>
            <button class="btn" onclick="changePassword()">Update Password</button>
        </div>

        <button class="btn btn-red" onclick="logout()" style="margin-top:20px;">Logout</button>
    </div>

    <div class="page" id="forgetPage">
        <div class="input-box"><label>Email</label><input id="fg_email"></div>
        <button class="btn" onclick="resetPassword()">Send Reset</button>
        <button class="btn btn-gray" onclick="showPage('loginPage')">Back</button>
    </div>

    <div class="log-box" id="log"></div>
</div>

<script>
let idToken = "";
let email = "";
const API = "/api/main";

function show(m,c){
    document.getElementById("log").innerHTML=`<div class="${c}">${m}</div>`;
}

function showPage(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function showFunc(id){
    document.querySelectorAll(".funcContent").forEach(f=>f.style.display="none");
    document.getElementById(id).style.display="block";
}

function logout(){
    idToken=""; email="";
    showPage("loginPage");
    show("Logged out","info");
}

async function login(){
    const e=document.getElementById("login_email").value;
    const p=document.getElementById("login_pwd").value;
    if(!e||!p)return show("Fill all fields","error");
    show("Logging...","info");
    try{
        let r=await fetch(API,{
            method:"POST",
            body:JSON.stringify({act:"login",email:e,pwd:p})
        });
        let d=await r.json();
        idToken=d.idToken;
        email=e;
        show("Login success","success");
        showPage("funcPage");
        showFunc("crown");
    }catch(e){show("Failed","error");}
}

async function crown(){
    if(!idToken)return show("Login first","error");
    show("Processing...","info");
    try{
        await fetch(API,{method:"POST",body:JSON.stringify({act:"crown",idToken,email})});
        show("Success","success");
    }catch(e){show("Failed","error");}
}

async function changeEmail(){
    const newE=document.getElementById("new_email").value;
    if(!newE)return show("Enter email","error");
    show("Updating...","info");
    try{
        await fetch(API,{method:"POST",body:JSON.stringify({act:"email",idToken,newEmail:newE})});
        show("Updated","success");
        email=newE;
    }catch(e){show("Failed","error");}
}

async function changePassword(){
    const newP=document.getElementById("new_pwd").value;
    if(!newP)return show("Enter password","error");
    show("Updating...","info");
    try{
        await fetch(API,{method:"POST",body:JSON.stringify({act:"pwd",idToken,newPwd:newP})});
        show("Updated","success");
    }catch(e){show("Failed","error");}
}

async function resetPassword(){
    const e=document.getElementById("fg_email").value;
    if(!e)return show("Enter email","error");
    show("Sending...","info");
    try{
        await fetch(API,{method:"POST",body:JSON.stringify({act:"reset",email:e})});
        show("Sent","success");
    }catch(e){show("Failed","error");}
}
</script>
</body>
</html>
